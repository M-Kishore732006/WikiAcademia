<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Graduation cap base (mortarboard platform) -->
  <polygon points="32,14 56,25 32,36 8,25" fill="url(#accent)"/>

  <!-- Cap top square -->
  <rect x="26" y="11" width="12" height="4" rx="1" fill="url(#accent)"/>

  <!-- Hanging tassel line -->
  <line x1="56" y1="25" x2="56" y2="38" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="56" cy="40" r="2.5" fill="#818cf8"/>

  <!-- Cap stand (graduation gown body) -->
  <path d="M21 30 L21 44 Q32 50 43 44 L43 30 L32 36 Z" fill="url(#accent)" opacity="0.85"/>
</svg>
